<!DOCTYPE html>
<html lang="es">
<head>

  <link rel="stylesheet" href="/css/style.css">

  <header class="site-header">

      <a href="index.html" class="logo" id="siteLogo">Mi Vlog</a>
      <nav class="nav-links" id="socialNavTop">
        <!-- Links se llenan dinámicamente -->
      </nav>
    </div>

  <main id="dynamicLayout">

    <div style="text-align: center; padding: var(--space-3xl);">Cargando tu espacio...</div>
